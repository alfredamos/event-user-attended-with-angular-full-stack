<div class="grid grid-cols-1 gap-2 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4">
  @for (event of events(); track event.id) {
    <div class="p-2 max-w-sm">
      <div class="h-full border rounded-lg overflow-hidden">
        <img class="w-full h-48 object-cover" [src]="event.image" [alt]="event.name"/>
        <div class="p-4 ">
          <h5 class="text-xl font-semibold mb-2">{{event.name}}</h5>
          <p class="text-gray-600">Date: {{event.date | date }}</p>
          <p class="text-gray-600">Location: {{event.location}}</p>
          <div class="flex flex-col md:flex-row gap-2 items-center mt-2">

            @if(isLoggedIn()) {

                <button class="w-full md:flex-1 m-1 py-2 border-2 border-yellow-900 px-4 hover:bg-yellow-900 hover:text-white text-yellow-900 font-bold rounded-lg" type="button">
                    <a [routerLink]="`/events/${event.id}/detail`">Detail</a>
                </button>
                <button class="w-full md:flex-1 m-1 py-2 px-4 border-2 border-indigo-900 hover:bg-indigo-900 hover:text-white text-indigo-900 font-bold rounded-lg" type="button" (click)="addAttendee(event)">
                   Register
                </button>


            }@else {
              <div class="text-indigo-300 hover:text-rose-300">
                <a routerLink="/login">Please Login</a>
              </div>
            }
          </div>

        </div>
      </div>
    </div>
  }
</div>
